services:
  frontend:
    image: generaltao725/artist-insight-frontend:latest
    env_file:
      - ../.env
    healthcheck:
      test: >-
        node -e 'fetch("http://127.0.0.1:3000/api/actuator/health")
        .then((response) => process.exit(response.ok ? 0 : 1))
        .catch(() => process.exit(1))'
      interval: 10s
      timeout: 10s
      retries: 30